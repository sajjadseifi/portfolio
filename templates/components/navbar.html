{% load static %}
<nav
    x-data="navbar()"
    x-init="init()"
    class="fixed inset-x-0 top-0 z-50">

    <div class="mx-auto mt-5 max-w-7xl px-4 sm:px-6 lg:px-8">

        <!-- NAVBAR -->
        <div
            class="relative flex h-16 items-center justify-between rounded-2xl border border-white/10 bg-white/10 px-4 sm:px-6 backdrop-blur-2xl shadow-[0_8px_40px_rgba(0,0,0,0.35)]">

            <div class="absolute inset-0 rounded-2xl bg-gradient-to-r from-violet-500/5 via-fuchsia-500/5 to-cyan-500/5"></div>

            <!-- Logo -->
            <a
                href="#home"
                class="relative z-10 flex items-center gap-3 group">

                <div
                    class="relative flex h-11 w-11 items-center justify-center overflow-hidden rounded-2xl transition duration-300 group-hover:scale-105">
                    <div
                        class="flex h-12 w-12 items-center justify-center rounded-xl bg-violet-600">
                    
                        <img
                            src="{% static 'icons/logo.png' %}"
                            alt="Logo"
                            class="h-full w-full object-contain">
                    
                    </div>


                </div>

                <div >
                    <h1 class="text-sm font-bold tracking-wide text-white">
                        {{profile.full_name_en}}
                    </h1>

                    <p class="text-xs text-gray-400">
                        {{profile.title}}
                    </p>
                </div>

            </a>

            <!-- Desktop Menu -->
            <ul class="relative z-10 hidden lg:flex items-center gap-8">

                <template x-for="item in items" :key="item.id">

                    <li class="relative">

                        <a
                            :href="'#' + item.id"
                            @click="active=item.id"
                            class="group relative text-sm font-medium transition duration-300"
                            :class="active === item.id
                                ? 'text-white'
                                : 'text-gray-400 hover:text-white'">

                            <span x-text="item.label"></span>

                            <span
                                class="absolute -bottom-3 left-1/2 h-1.5 w-1.5 -translate-x-1/2 rounded-full bg-violet-400 transition-all duration-300"
                                :class="active === item.id
                                    ? 'opacity-100 scale-100'
                                    : 'opacity-0 scale-0 group-hover:opacity-60 group-hover:scale-100'">
                            </span>

                        </a>

                    </li>

                </template>

            </ul>

            <!-- Right -->
            <div class="relative z-10 hidden lg:flex items-center gap-3">

                {% comment %} {% include "components/theme-switch.html" %} {% endcomment %}

                <!-- Download CV -->
                <a
                    href="{{ profile.resume.url }}"
                    download
                    class="inline-flex items-center gap-2 rounded-xl bg-gradient-to-r from-violet-600 to-fuchsia-600 px-5 py-2.5 text-sm font-semibold text-white shadow-lg shadow-violet-900/30 transition hover:scale-[1.03] hover:shadow-violet-700/40">

                    <!-- Icon -->
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-4 w-4"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                        stroke-width="2">

                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M12 3v12m0 0l4-4m-4 4l-4-4M4 21h16"/>

                    </svg>

                    Download CV

                </a>

            </div>

            <!-- Mobile Button -->
            <button
                @click="open=!open"
                class="relative z-10 flex h-11 w-11 items-center justify-center rounded-xl border border-white/10 bg-white/5 text-white backdrop-blur-xl transition hover:bg-white/10 lg:hidden">

                <svg
                    x-show="!open"
                    x-transition
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-6 w-6"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 6h16M4 12h16M4 18h16"/>

                </svg>

                <svg
                    x-show="open"
                    x-transition
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-6 w-6"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M6 18L18 6M6 6l12 12"/>

                </svg>

            </button>

        </div>

        <!-- Mobile Menu -->
        <div
            x-show="open"
            x-transition
            @click.outside="open=false"
            class="mt-4 overflow-hidden rounded-2xl border border-white/10 bg-black/70 backdrop-blur-2xl shadow-2xl lg:hidden">

            <div class="flex flex-col p-3">

                <template x-for="item in items" :key="item.id">

                    <a
                        :href="'#' + item.id"
                        @click="active=item.id; open=false"
                        class="flex items-center justify-between rounded-xl px-4 py-3 text-sm font-medium transition-all duration-300"
                        :class="active === item.id
                            ? 'bg-violet-500/10 text-white'
                            : 'text-gray-400 hover:bg-white/5 hover:text-white'">

                        <span x-text="item.label"></span>

                        <span
                            class="h-2 w-2 rounded-full bg-violet-400"
                            x-show="active === item.id"
                            x-transition>
                        </span>

                    </a>

                </template>

                <!-- Bottom -->
                <div class="mt-3 flex items-center justify-between border-t border-white/10 pt-4">

                    {% comment %} {% include "components/theme-switch.html" %} {% endcomment %}

                    <a
                        href="{{ profile.resume.url }}"
                        download
                        class="inline-flex items-center gap-2 rounded-xl bg-gradient-to-r from-violet-600 to-fuchsia-600 px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-violet-900/30">

                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="w-4 h-4"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                            stroke-width="2">

                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M12 3v12m0 0l4-4m-4 4l-4-4M4 21h16"/>

                        </svg>

                        Download CV

                    </a>

                </div>

            </div>

        </div>

    </div>

</nav>

<script>
function navbar() {
    return {

        open: false,
        active: 'home',

        items: [
            { id: 'home', label: 'Home' },
            { id: 'about', label: 'About' },
            { id: 'skills', label: 'Skills' },
            { id: 'projects_experience', label: 'Projects & Experience' },
            { id: 'contact', label: 'Contact' },
        ],

        init() {

            const sections = document.querySelectorAll("section[id]");

            window.addEventListener("scroll", () => {

                let current = "home";

                sections.forEach(section => {

                    const sectionTop = section.offsetTop - 120;
                    const sectionHeight = section.offsetHeight;

                    if (
                        window.scrollY >= sectionTop &&
                        window.scrollY < sectionTop + sectionHeight
                    ) {
                        current = section.getAttribute("id");
                    }

                });

                this.active = current;

            });

        }

    }
}
</script>
